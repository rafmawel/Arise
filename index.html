<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#06060f;--bg2:#0d0d1a;--bg3:#141428;--bg4:#1c1c3a;
--pink:#ff2d78;--cyan:#00f0ff;--gold:#ffd700;--purple:#b44aff;
--green:#00ff88;--red:#ff4444;--blue:#4488ff;--orange:#ff8844;
--text:#e8e8f0;--text2:#8888aa;--text3:#555577;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif;overflow-x:hidden;touch-action:manipulation}
body{padding-bottom:env(safe-area-inset-bottom)}
::-webkit-scrollbar{width:0}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--pink),0 0 20px var(--pink)33}50%{box-shadow:0 0 15px var(--pink),0 0 40px var(--pink)55}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes scaleIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes damageFlash{0%{background:var(--red)22}100%{background:transparent}}
@keyframes portalSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes glitchText{0%,100%{text-shadow:0 0 10px var(--cyan)}33%{text-shadow:-2px 0 var(--pink),2px 0 var(--cyan)}66%{text-shadow:2px 0 var(--pink),-2px 0 var(--cyan)}}

.animate-in{animation:fadeIn .4s ease both}
.float{animation:float 3s ease-in-out infinite}

#app{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;overflow-x:hidden}
.page{padding:16px 16px 90px;display:none}.page.active{display:block}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:linear-gradient(180deg,transparent 0%,var(--bg) 30%);padding:8px 0 0}
.nav-inner{display:flex;justify-content:space-around;background:var(--bg2);border-top:1px solid var(--bg4);padding:6px 0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.nav-btn{background:none;border:none;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px;font-size:17px;transition:.2s}
.nav-btn.active{color:var(--pink)}
.nav-btn span{font-size:7px;font-family:'Press Start 2P',monospace;letter-spacing:.5px}

.box{background:var(--bg2);border:2px solid var(--bg4);border-radius:14px;padding:14px;margin-bottom:12px;transition:border-color .3s}
.glow-p{border-color:var(--pink)!important;box-shadow:0 0 20px var(--pink)18}
.glow-c{border-color:var(--cyan)!important;box-shadow:0 0 20px var(--cyan)18}
.glow-g{border-color:var(--gold)!important;box-shadow:0 0 20px var(--gold)18}
.glow-v{border-color:var(--purple)!important;box-shadow:0 0 20px var(--purple)18}
.glow-gr{border-color:var(--green)!important;box-shadow:0 0 20px var(--green)18}

.title{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:2px}
.pixel{font-family:'Press Start 2P',monospace}
.label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;font-family:'Orbitron',sans-serif}

.bar-t{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;border:1px solid var(--bg4)}
.bar-f{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bar-sm .bar-t{height:6px}

.btn{border:none;border-radius:10px;padding:12px 24px;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:.15s;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 20px var(--pink)44}
.btn-c{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#000}
.btn-g{background:linear-gradient(135deg,var(--gold),#ff8800);color:#000}
.btn-gh{background:transparent;border:1px solid var(--bg4);color:var(--text2)}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px}
.btn-bl{width:100%;display:block}

.inp{background:var(--bg);border:2px solid var(--bg4);color:var(--text);padding:12px;border-radius:10px;font-size:16px;font-family:'Chakra Petch',sans-serif;font-weight:600;width:100%;outline:none;text-align:center;transition:border-color .2s}
.inp:focus{border-color:var(--pink)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;appearance:textfield}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center;justify-content:center}
.tc{text-align:center}
.mt1{margin-top:8px}.mt2{margin-top:16px}.mt3{margin-top:24px}
.mb1{margin-bottom:8px}.mb2{margin-bottom:16px}

.overlay{position:fixed;inset:0;z-index:9999;background:rgba(2,2,8,.94);display:flex;align-items:center;justify-content:center;animation:fadeIn .3s}

.rarity-c{color:#9ca3af}.rarity-r{color:#60a5fa}.rarity-e{color:#c084fc}.rarity-l{color:#ffd700}
.hp-t{height:14px;background:var(--bg);border-radius:7px;overflow:hidden;border:2px solid var(--red)33;margin:6px 0}
.hp-f{height:100%;background:linear-gradient(90deg,var(--red),#ff6644);border-radius:5px;transition:width 1s ease}

.equip-slot{background:var(--bg);border:2px dashed var(--bg4);border-radius:12px;padding:10px;text-align:center;min-height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.equip-slot.filled{border-style:solid}
.equip-slot:active{transform:scale(.96)}

.rpe-btn{width:52px;height:52px;border-radius:50%;border:2px solid var(--bg4);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:.2s}
.rpe-btn.sel{transform:scale(1.15);border-width:3px}

.phase-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:1px}
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:5px;border:1px solid}
</style>
</head>

function gR(xp){let r=RANKS[0];for(const x of RANKS)if(xp>=x.min)r=x;return r}
function nR(xp){for(const r of RANKS)if(xp<r.min)return r;return null}
function e1RM(w,r){if(r<=0||w<=0)return 0;return r===1?w:Math.round(w*(1+r/30))}
function gWW(){const a=Date.now()-7*864e5;return(S.hist||[]).filter(w=>w.d>a).length}
function gPhase(){return PHASES[Math.min(S.phase||0,3)]}
function gSessions(){return gPhase().sessions}

function gLW(eid){
  for(let i=S.hist.length-1;i>=0;i--){
    for(const e of(S.hist[i].ex||[])){
      if(e.id===eid){const d=e.sets.filter(s=>s.done&&s.w>0);if(d.length)return d[d.length-1].w}
    }
  }
  return 0;
}
function gLRPE(si){for(let i=S.hist.length-1;i>=0;i--)if(S.hist[i].si===si)return S.hist[i].rpe||3;return 3}
function sugW(eid,si){
  const l=gLW(eid);
  if(!l){
    // First time: use default weight for this exercise
    const ex=EX[eid];
    return ex?.dw||0;
  }
  const rpe=gLRPE(si);const o=RPE.find(r=>r.v===rpe);
  return Math.max(0,Math.round((l+(o?o.adj:0))*2)/2); // round to 0.5
}
function isFirstTime(eid){return gLW(eid)===0}

function tStats(){
  const b={...S.stats};const eq=S.eq||{};
  for(const sl of Object.keys(eq)){if(!eq[sl])continue;const it=ITEMS_DB.find(i=>i.id===eq[sl]);if(it)for(const k of["STR","END","VIT","AGI"])b[k]+=(it.st[k]||0)}
  return b;
}
function eqCt(){return Object.values(S.eq||{}).filter(Boolean).length}
function maxW(){let m=0;(S.hist||[]).forEach(w=>(w.ex||[]).forEach(e=>(e.sets||[]).forEach(s=>{if(s.done&&s.w>m)m=s.w})));return m}

function calcDmg(vol,rpe){
  let d=Math.round(vol*.15);
  if(rpe>=4)d=Math.round(d*1.3);else if(rpe===3)d=Math.round(d);else if(rpe===2)d=Math.round(d*.85);else d=Math.round(d*.7);
  const eq=S.eq||{};
  for(const sl of Object.keys(eq)){if(!eq[sl])continue;const it=ITEMS_DB.find(i=>i.id===eq[sl]);if(!it?.ef)continue;
    if(it.ef==="berserk"&&rpe>=4)d=Math.round(d*1.15);if(it.ef==="dmg50")d=Math.round(d*1.5);if(it.ef==="dmg20")d=Math.round(d*1.2);
    if(it.ef==="crit10"&&Math.random()<.1)d*=2;
  }
  return Math.max(d,10);
}

function spawnMon(){
  const k=S.kills||0;const t=Math.min(Math.floor(k/3),5);const b=MONSTERS[t];
  const hp=Math.round(b.hp*(1+k*.15));
  S.mon={id:b.id,n:b.n,e:b.e,hp,mhp:hp,lv:k+1,t:b.t,xp:Math.round(b.xp*(1+k*.1))};sv();
}
function dropL(tier){const tb=LOOT[Math.min(tier,5)];const ow=new Set(S.inv);const av=tb.filter(i=>!ow.has(i));const p=av.length?av:tb;return p[Math.floor(Math.random()*p.length)]}

function checkPhase(){
  const w=S.week||1;const cp=S.phase||0;
  for(let p=PHASES.length-1;p>=0;p--){if(w>=PHASES[p].minWeek&&p>cp)return p}
  return cp;
}

function startW(){

  rW();
}

function rW(){
  if(!WS){render();return}

  if(WS.ph==="rest"){rRest(WS.ex[WS.ce].rest,sess.color);return}

  if(WS.ph==="dmg"){rDmg(sess);return}
  if(WS.ph==="ai"){rAI(sess);return}
  if(WS.ph==="phase"){rPhaseUp();return}

  const ex=WS.ex[WS.ce],info=EX[ex.id],sg=sugW(ex.id,WS.si);
  const dots=WS.ex.map((_,i)=>`<div style="flex:1;height:4px;border-radius:2px;background:${i<WS.ce?sess.color:i===WS.ce?sess.color+'88':'var(--bg4)'}"></div>`).join('');

  $('#app').innerHTML=`<div style="padding:16px 16px 40px">
  <div class="fb mb2"><div class="pixel" style="font-size:7px;color:${sess.color};letter-spacing:1px">${sess.name}</div><div style="font-size:11px;color:var(--text3)">Exo ${WS.ce+1}/${WS.ex.length}</div></div>
  <div style="display:flex;gap:3px;margin-bottom:14px">${dots}</div>
  <div class="box" style="border-color:${sess.color}66">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="font-size:32px">${info?.i}</div><div><div style="font-size:16px;font-weight:800">${info?.n}</div><div style="font-size:11px;color:var(--text2)">${info?.m} • ${ex.r} reps • ${ex.s} séries</div></div></div>
    ${ex.sets.map((s,si)=>{const cur=si===WS.cs;
      return`<div style="display:flex;align-items:center;gap:7px;padding:9px 0;${si?'border-top:1px solid var(--bg4)':''};opacity:${cur?1:s.done?.45:.25}">
        <div style="width:28px;height:28px;border-radius:7px;background:${s.done?sess.color:cur?sess.color+'33':'var(--bg)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${s.done?'#000':'var(--text3)'};flex-shrink:0;font-family:'Press Start 2P',monospace">${s.done?'✓':si+1}</div>
        <div style="display:flex;gap:6px;flex:1">
          <div style="flex:1"><div style="font-size:7px;color:var(--text3);margin-bottom:2px">KG</div><input type="number" class="inp wi" data-e="${WS.ce}" data-s="${si}" data-f="w" value="${s.w}" ${!cur||s.done?'disabled':''} style="padding:8px 4px;font-size:16px;border-color:${cur?sess.color:'var(--bg4)'}"></div>
          <div style="flex:1"><div style="font-size:7px;color:var(--text3);margin-bottom:2px">REPS</div><input type="number" class="inp wi" data-e="${WS.ce}" data-s="${si}" data-f="r" value="${s.r}" ${!cur||s.done?'disabled':''} style="padding:8px 4px;font-size:16px;border-color:${cur?sess.color:'var(--bg4)'}"></div>
        </div>
        ${cur&&!s.done?`<button class="btn btn-sm" style="background:${sess.color};color:#000;flex-shrink:0;font-weight:800;padding:9px 13px" id="btn-ok">OK</button>`:''}
      </div>`;}).join('')}
  </div>
  ${sg?`<div class="box" style="padding:9px;font-size:11px;color:var(--text2)">
    ${isFirstTime(ex.id)?`⚡ <strong style="color:var(--gold)">Charge de départ : ${sg}kg</strong><br><span style="font-size:10px">C'est une estimation pour ta reprise. Ajuste selon ton ressenti.</span>`
    :`💡 <strong style="color:var(--gold)">${sg}kg</strong> suggéré (dernière fois ${gLW(ex.id)}kg ${(()=>{const diff=sg-gLW(ex.id);return diff>0?`<span style="color:var(--green)">+${diff}kg</span>`:diff<0?`<span style="color:var(--red)">${diff}kg</span>`:'= identique'})()})`}
  </div>
  ${info?.tip?`<div style="padding:6px 10px;font-size:10px;color:var(--text3);border-left:2px solid ${sess.color}44;margin-bottom:8px">📝 ${info.tip}</div>`:''}`
  :`<div class="box" style="padding:9px;font-size:11px;color:var(--text2)">💡 Exercice au poids du corps ou chrono — donne tout !</div>

function okSet(){
  WS.ex[WS.ce].sets[WS.cs].done=true;
  if(WS.cs<WS.ex[WS.ce].sets.length-1){WS.ph="rest";WS._nxt=()=>{WS.cs++;WS.ph="ex"}}
  else if(WS.ce<WS.ex.length-1){WS.ph="rest";WS._nxt=()=>{WS.ce++;WS.cs=0;WS.ph="ex"}}
  else WS.ph="rpe";
  rW();
}

function rRest(sec,col){
  let left=sec;
  const nxtLabel=WS.cs<WS.ex[WS.ce].sets.length-1?`Série ${WS.cs+2}`:(WS.ce<WS.ex.length-1?EX[WS.ex[WS.ce+1]?.id]?.n:'Fin');
  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div class="pixel" style="font-size:8px;color:var(--cyan);letter-spacing:3px;margin-bottom:8px">REPOS</div>
    <div id="td" class="title" style="font-size:48px;color:var(--cyan)">${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}</div>

  $('#btn-skip').onclick=()=>{clearInterval(TI);WS._nxt();rW()};
}

  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
    <div style="font-size:44px;margin-bottom:10px">🏋️</div>

    ${RPE.map(r=>`<div style="text-align:center;cursor:pointer" class="rc" data-v="${r.v}"><div class="rpe-btn" id="rp-${r.v}" style="border-color:${r.c}33">${r.e}</div><div style="font-size:9px;color:var(--text3);margin-top:3px;max-width:52px">${r.l}</div></div>`).join('')}

function rSum(sess){
  const ts=WS.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  const tv=WS.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+(s.w||0)*(s.r||0),0),0);
  const rp=RPE.find(r=>r.v===WS.rpe);const dur=Math.round((Date.now()-WS.t0)/6e4);
  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">

      <div class="box tc" style="border-color:var(--cyan)22;padding:10px"><div style="font-size:22px;font-weight:800;color:var(--cyan)">${ts}</div><div class="pixel" style="font-size:6px;color:var(--text3)">SÉRIES</div></div>

    </div>
    <button class="btn btn-p btn-bl" style="max-width:260px" id="btn-claim">⚔️ Réclamer les Récompenses</button></div>`;
  $('#btn-claim').onclick=finishW;
}

function finishW(){
  const{sess}=WS;
  const log={d:Date.now(),si:WS.si,nm:sess.name,rpe:WS.rpe,ex:WS.ex.map(e=>({id:e.id,sets:e.sets.filter(s=>s.done).map(s=>({w:s.w,r:s.r,done:true}))})),dmg:0};
  let xp=30;const sg={STR:0,END:0,VIT:0,AGI:0};
  WS.ex.forEach(e=>{const info=EX[e.id];e.sets.forEach(s=>{if(s.done&&s.w>0){xp+=5;sg[info?.s||"STR"]++}})});
  // XP equip bonus
  for(const sl of Object.keys(S.eq)){if(!S.eq[sl])continue;const it=ITEMS_DB.find(i=>i.id===S.eq[sl]);if(it?.ef==="xp15")xp=Math.round(xp*1.15);if(it?.ef==="xp20q")xp=Math.round(xp*1.1)}
  const tv=WS.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+(s.w||0)*(s.r||0),0),0);
  const dmg=calcDmg(tv,WS.rpe);log.dmg=dmg;
  const oR=gR(S.xp);
  S.xp+=xp;for(const k of["STR","END","VIT","AGI"])S.stats[k]=Math.min(S.stats[k]+(sg[k]||0),999);
  S.hist.push(log);S.ns=(S.ns+1)%gSessions().length;S.week=Math.floor(S.hist.length/3)+1;
  let mk=false,loot=null;
  if(S.mon){S.mon.hp=Math.max(0,S.mon.hp-dmg);if(S.mon.hp<=0){mk=true;S.xp+=S.mon.xp;const lid=dropL(S.mon.t);loot=ITEMS_DB.find(i=>i.id===lid);if(lid)S.inv.push(lid);S.kills=(S.kills||0)+1}}
  const ctx={t:S.hist.length,wk:gWW(),st:tStats(),mw:maxW(),kl:S.kills||0,eq:eqCt(),ph:S.phase||0};
  const nq=[];QUESTS.forEach(q=>{if((S.cq||[]).includes(q.id)&&q.o)return;if(q.ck(ctx)&&!(S.cq||[]).includes(q.id)){S.cq=S.cq||[];S.cq.push(q.id);S.xp+=q.xp;nq.push(q)}});
  const nRk=gR(S.xp);const ranked=nRk.n!==oR.n;
  // Check phase transition
  const newPh=checkPhase();const phaseUp=newPh>S.phase;
  if(phaseUp)S.phase=newPh;
  sv();
  Object.assign(WS,{xp,dmg,mk,loot,nq,ranked,nRk,sg,phaseUp,newPhase:newPh});
  WS.ph="dmg";rW();
}

function rDmg(sess){
  const m=S.mon;
  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
  <div class="label mb1" style="color:var(--red);letter-spacing:3px">⚔️ ATTAQUE ⚔️</div>
  ${m?`<div id="mh" style="font-size:56px;margin:8px 0">${m.e}</div><div style="font-size:15px;font-weight:700;margin-bottom:4px">${m.n}</div>
  <div class="hp-t" style="width:220px;margin:6px auto"><div class="hp-f" style="width:${(m.hp/m.mhp)*100}%"></div></div>
  <div style="font-size:12px;color:var(--red)">${m.hp}/${m.mhp} HP</div>`:''}
  <div class="title" style="font-size:26px;color:var(--red);margin:10px 0;text-shadow:0 0 20px var(--red)44">-${WS.dmg} DMG</div>
  <div style="color:var(--gold);margin-bottom:3px">+${WS.xp} XP</div>
  <div style="display:flex;gap:6px;justify-content:center;margin-bottom:16px">${Object.entries(WS.sg).filter(([,v])=>v).map(([k,v])=>`<span class="pixel" style="font-size:7px;color:var(--green)">+${v}${k}</span>`).join('')}</div>

  ${WS.mk?`<div class="box glow-g" style="margin-bottom:12px;padding:14px;animation:scaleIn .5s">
    <div class="pixel" style="font-size:7px;color:var(--gold);margin-bottom:6px;letter-spacing:2px">🏆 MONSTRE VAINCU</div>
    ${WS.loot?`<div style="font-size:28px;margin:6px 0">${WS.loot.i}</div><div style="font-size:12px;font-weight:700;color:${RC[WS.loot.ra]}">${WS.loot.n}</div><div class="pixel" style="font-size:7px;color:${RC[WS.loot.ra]}">${RN[WS.loot.ra]}</div>`:''}
  </div>`:''}

  ${WS.nq.map(q=>`<div class="box glow-gr" style="margin-bottom:8px;padding:9px;animation:scaleIn .5s"><div class="pixel" style="font-size:7px;color:var(--green);margin-bottom:3px">✦ QUÊTE</div><div style="font-size:12px;font-weight:700">${q.n}</div><div class="pixel" style="font-size:7px;color:var(--gold)">+${q.xp} XP</div></div>`).join('')}

  ${WS.ranked?`<div style="margin:12px 0;animation:scaleIn .6s"><div class="pixel" style="font-size:7px;color:var(--gold);letter-spacing:3px;margin-bottom:6px">⚡ LEVEL UP ⚡</div><div class="title" style="font-size:44px;color:${WS.nRk.c};text-shadow:0 0 30px ${WS.nRk.c}44">${WS.nRk.n}-RANK</div><div class="pixel" style="font-size:9px;color:${WS.nRk.c}">${WS.nRk.t}</div></div>`:''}

  <button class="btn btn-p btn-bl mt2" style="max-width:260px" id="btn-cont">Continuer</button></div>`;

  setTimeout(()=>{$('#mh')&&($('#mh').style.animation='shakeX .4s ease')},200);
  $('#btn-cont').onclick=()=>{
    if(WS.mk)spawnMon();
    if(WS.phaseUp){WS.ph="phase";rW()}
    else if(S.key){WS.ph="ai";rW();fetchAI()}
    else{WS=null;pg="home";render()}
  };
}

function rPhaseUp(){
  const ph=PHASES[WS.newPhase];
  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
  <div style="width:100px;height:100px;border-radius:50%;border:3px solid ${ph.color};display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:portalSpin 4s linear infinite;box-shadow:0 0 30px ${ph.color}44">
    <span style="font-size:48px">${ph.dungeonIcon}</span>
  </div>
  <div class="pixel" style="font-size:8px;color:${ph.color};letter-spacing:3px;margin-bottom:8px;animation:glitchText 2s infinite">NOUVEAU DONJON</div>
  <h2 class="title" style="font-size:22px;color:${ph.color};margin-bottom:4px;text-shadow:0 0 20px ${ph.color}44">${ph.dungeon}</h2>
  <p style="color:var(--text2);margin-bottom:4px">${ph.name}</p>
  <p style="color:var(--text3);font-size:12px;margin-bottom:20px">${ph.sub}</p>

  <div class="box" style="border-color:${ph.color}44;max-width:300px;text-align:left">
    <div class="label mb1" style="color:${ph.color}">NOUVEAUX EXERCICES</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8">
    ${ph.sessions.flatMap(s=>s.ex.map(e=>e.id)).filter((v,i,a)=>a.indexOf(v)===i).filter(id=>!PHASES.slice(0,WS.newPhase).some(p=>p.sessions.some(s=>s.ex.some(e=>e.id===id)))).slice(0,6).map(id=>{const ex=EX[id];return ex?`${ex.i} <strong style="color:var(--text)">${ex.n}</strong> — ${ex.m}`:'';}).join('<br>')}
    </div>
  </div>

  <button class="btn btn-p btn-bl mt3" style="max-width:260px" id="btn-enter">⚔️ Entrer dans le Donjon</button></div>`;

  $('#btn-enter').onclick=()=>{
    if(S.key){WS.ph="ai";rW();fetchAI()}
    else{WS=null;pg="home";render()}
  };
}

async function fetchAI(){
  const{sess}=WS;const rp=RPE.find(r=>r.v===WS.rpe);
  const tv=WS.ex.reduce((a,e)=>a+e.sets.filter(s=>s.done).reduce((b,s)=>b+(s.w||0)*(s.r||0),0),0);
  const exSum=WS.ex.map(e=>{const info=EX[e.id];const d=e.sets.filter(s=>s.done);return`${info.n}: ${d.map(s=>`${s.w}kg×${s.r}`).join(', ')}`}).join('\n');

  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
    <div style="font-size:44px" class="float">🔮</div>
    <div class="pixel" style="font-size:7px;color:var(--purple);letter-spacing:3px;margin-top:12px;animation:pulse 1.5s infinite">ANALYSE EN COURS...</div></div>`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20241022',max_tokens:300,messages:[{role:'user',content:`Tu es le "Système" d'un programme fitness gamifié style Solo Leveling. Parle en français, concis et motivant. Le programme: 2 séances haltéro (clean, snatch, squats lourds) + 1 course structurée + 1 bonus. Objectifs: perte de graisse, gain musculaire, progresser en haltéro, objectif 10km sous 40min à terme.
Séance: ${sess.name} | RPE: ${rp?.l} (${WS.rpe}/5) | Volume: ${Math.round(tv)}kg | Semaine: ${S.week} | Phase: ${gPhase().name}
Stats: STR ${S.stats.STR}, END ${S.stats.END}, VIT ${S.stats.VIT}, AGI ${S.stats.AGI}
Exercices:\n${exSum}
Donne 3-4 phrases max: feedback séance, conseil pour la prochaine, motivation Solo Leveling. Réponds directement.`}]})});
    const d=await r.json();showAI(d.content?.map(c=>c.text||'').join('')||"Le Système est temporairement hors ligne.");
  }catch(e){showAI("Le Système n'a pas pu se connecter. Continue, Hunter.")}
}

function showAI(txt){
  $('#app').innerHTML=`<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center">
    <div style="font-size:44px;margin-bottom:10px">🔮</div>
    <div class="pixel" style="font-size:7px;color:var(--purple);letter-spacing:3px;margin-bottom:14px">MESSAGE DU SYSTÈME</div>
    <div class="box glow-v" style="max-width:300px;text-align:left"><p style="font-size:13px;line-height:1.7">${txt}</p></div>
    <button class="btn btn-p btn-bl mt3" style="max-width:260px" id="btn-cai">Compris ⚔️</button></div>`;
  $('#btn-cai').onclick=()=>{WS=null;pg="home";render()};
}

// ============================================================
// EVENTS
// ============================================================
function bind(){
  $$('.nav-btn').forEach(b=>b.onclick=()=>show(b.dataset.p));
  $('#btn-go')?.addEventListener('click',startW);
  $$('[data-go]').forEach(e=>e.onclick=()=>show(e.dataset.go));
  $$('[data-eq]').forEach(b=>b.onclick=()=>{
    const iid=b.dataset.eq;const it=ITEMS_DB.find(i=>i.id===iid);if(!it)return;
    if(S.eq[it.sl]===iid)S.eq[it.sl]=null;else S.eq[it.sl]=iid;sv();render();show('equip')});
  $$('[data-sl]').forEach(e=>e.onclick=()=>{if(S.eq?.[e.dataset.sl]){S.eq[e.dataset.sl]=null;sv();render();show('equip')}});
  $('#btn-set')?.addEventListener('click',()=>show('set'));
  $('#btn-bk')?.addEventListener('click',()=>show('equip'));
  $('#btn-skey')?.addEventListener('click',()=>{S.key=$('#inp-key').value.trim();sv();alert('Clé sauvegardée !')});
  $('#btn-exp')?.addEventListener('click',()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='arise-backup.json';a.click();URL.revokeObjectURL(u)});
  $('#btn-rst')?.addEventListener('click',()=>{if(confirm("⚠️ Supprimer TOUTES tes données ?")){localStorage.removeItem('arise2');S={...DEF};pg='home';render()}});
}

// INIT
S=ld()||{...DEF};
if(S.on&&!S.mon)spawnMon();
// Auto-check phase on load
if(S.on){const np=checkPhase();if(np>S.phase){S.phase=np;sv()}}
render();
</script>
